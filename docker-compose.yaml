services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cohorts
      POSTGRES_PASSWORD: cohorts
      POSTGRES_DB: cohorts
    volumes:
      - cohorts-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cohorts -d cohorts"]
      interval: 2s
      timeout: 2s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://cohorts:cohorts@db:5432/cohorts
      FLASK_APP: cohorts
      # Passed through from the host so operators can invoke `flask fetch_firmware`
      # via `docker compose exec`. Unset on the host -> unset in the container.
      MEMFAULT_TOKEN: ${MEMFAULT_TOKEN:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PATH: ${S3_PATH:-fw/}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      FIRMWARE_ROOT: ${FIRMWARE_ROOT:-https://binaries.rebble.io/fw}
    ports:
      - "5000:5000"
    volumes:
      - .:/code
      - /code/.venv
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uv run flask db upgrade && uv run python serve_debug.py"

volumes:
  cohorts-pg-data:
