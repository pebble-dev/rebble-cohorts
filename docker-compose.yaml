services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cohorts
      POSTGRES_PASSWORD: cohorts
      POSTGRES_DB: cohorts
    volumes:
      - cohorts-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cohorts -d cohorts"]
      interval: 2s
      timeout: 2s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://cohorts:cohorts@db:5432/cohorts
      FLASK_APP: cohorts
      # Passed through from the host so operators can invoke `flask fetch_firmware`
      # via `docker compose exec`. Unset on the host -> unset in the container.
      MEMFAULT_TOKEN: ${MEMFAULT_TOKEN:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PATH: ${S3_PATH:-fw/}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      FIRMWARE_ROOT: ${FIRMWARE_ROOT:-https://binaries.rebble.io/fw}
    ports:
      - "5000:5000"
    volumes:
      - .:/code
      - /code/.venv
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uv run flask db upgrade && uv run python serve_debug.py"

  # Optional: `docker compose --profile s3 up` brings up a local S3-compatible
  # MinIO plus a one-shot sidecar that creates the `cohorts-binaries` bucket.
  # The S3 API is reachable inside the compose network at http://s3:9000 and
  # is intentionally not forwarded to the host; the admin console is forwarded
  # at http://localhost:59001.
  s3:
    image: minio/minio:latest
    profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cohorts
      MINIO_ROOT_PASSWORD: cohortscohorts
    ports:
      - "59001:9001"
    volumes:
      - cohorts-s3-data:/data

  s3-init:
    image: minio/mc:latest
    profiles: ["s3"]
    depends_on:
      - s3
    entrypoint: >
      sh -c "
        until mc alias set local http://s3:9000 cohorts cohortscohorts >/dev/null 2>&1; do sleep 1; done;
        mc mb --ignore-existing local/cohorts-binaries;
        mc anonymous set download local/cohorts-binaries;
        echo 'bucket ready: cohorts-binaries';
      "
    restart: "no"

volumes:
  cohorts-pg-data:
  cohorts-s3-data:
